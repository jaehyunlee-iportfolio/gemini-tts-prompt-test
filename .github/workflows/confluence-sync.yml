name: Sync Docs to Confluence

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  sync-confluence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync Confluence docs
        uses: Telefonica/markdown-confluence-sync-action@v2
        with:
          mode: id
          docs-dir: '.'
          files-pattern: 'docs/**/*.md'
          confluence-url: ${{ secrets.CONFLUENCE_URL }}
          confluence-space-key: ${{ secrets.CONFLUENCE_SPACE_KEY }}
          confluence-authentication: |
            {
              "basic": {
                "email": "${{ secrets.CONFLUENCE_EMAIL }}",
                "apiToken": "${{ secrets.CONFLUENCE_API_TOKEN }}"
              }
            }
          confluence-notice-message: >-
            이 페이지는 GitHub에서 자동 동기화됩니다. 직접 수정하면 다음 동기화 시 덮어씌워집니다.
            원본: https://github.com/${{ github.repository }}
          rehype: |
            {
              "codeBlocks": true,
              "githubAlerts": true
            }
          log-level: debug
